<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef9ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="45%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="shirtL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shirtR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="bfield" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#e0f2fe" opacity="0.55"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="18" fill="#6366f1" font-weight="700">×</text>
    </pattern>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#sky)"/>
  <rect x="40" y="70" width="640" height="220" rx="18" fill="url(#bfield)" stroke="#93c5fd" stroke-width="2"/>
  <text x="56" y="98" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4338ca" font-weight="700">Magnetic field B (into the plane)</text>

  <!-- ground -->
  <rect x="0" y="352" width="720" height="68" fill="url(#ground)"/>
  <line x1="0" y1="352" x2="720" y2="352" stroke="#166534" stroke-width="3"/>

  <!-- metallic rhombus frame -->
  <g filter="url(#softShadow)">
    <polygon points="360,130 500,210 360,290 220,210" fill="url(#metal)" stroke="#334155" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="360,130 500,210 360,290 220,210" fill="none" stroke="#f8fafc" stroke-width="1.5" opacity="0.65"/>
  </g>

  <!-- corner nodes -->
  <circle cx="360" cy="130" r="7" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <circle cx="500" cy="210" r="7" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <circle cx="360" cy="290" r="7" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <circle cx="220" cy="210" r="7" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>

  <!-- edge labels a -->
  <text x="430" y="162" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="700">a</text>
  <text x="430" y="272" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="700">a</text>
  <text x="285" y="205" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="700">a</text>
  <text x="405" y="205" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="700">a</text>

  <!-- pull arrows -->
  <line x1="500" y1="210" x2="585" y2="210" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="220" y1="210" x2="135" y2="210" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)"/>

  <!-- LEFT BOY (cartoon) -->
  <g transform="translate(78, 238)">
    <ellipse cx="0" cy="58" rx="34" ry="8" fill="#0f172a" opacity="0.12"/>
    <rect x="-16" y="18" width="32" height="38" rx="10" fill="url(#shirtL)"/>
    <rect x="-14" y="52" width="13" height="34" rx="6" fill="url(#pants)"/>
    <rect x="1" y="52" width="13" height="34" rx="6" fill="url(#pants)"/>
    <circle cx="0" cy="0" r="16" fill="#fcd9b6" stroke="#d97706" stroke-width="2"/>
    <circle cx="-5" cy="-2" r="2.2" fill="#1f2937"/>
    <circle cx="5" cy="-2" r="2.2" fill="#1f2937"/>
    <path d="M-4 5 Q0 9 4 5" fill="none" stroke="#be123c" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-3 -10 Q0 -16 8 -12" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
    <path d="M16 20 Q42 18 58 12" fill="none" stroke="#fcd9b6" stroke-width="8" stroke-linecap="round"/>
    <path d="M16 20 Q42 18 58 12" fill="none" stroke="#0284c7" stroke-width="5" stroke-linecap="round"/>
    <path d="M-10 56 L-18 86" stroke="#fcd9b6" stroke-width="7" stroke-linecap="round"/>
    <path d="M10 56 L20 86" stroke="#fcd9b6" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="108" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0f172a" font-weight="700">Boy A</text>
  </g>

  <!-- RIGHT BOY (cartoon) -->
  <g transform="translate(602, 238) scale(-1,1)">
    <ellipse cx="0" cy="58" rx="34" ry="8" fill="#0f172a" opacity="0.12"/>
    <rect x="-16" y="18" width="32" height="38" rx="10" fill="url(#shirtR)"/>
    <rect x="-14" y="52" width="13" height="34" rx="6" fill="url(#pants)"/>
    <rect x="1" y="52" width="13" height="34" rx="6" fill="url(#pants)"/>
    <circle cx="0" cy="0" r="16" fill="#f5c99a" stroke="#c2410c" stroke-width="2"/>
    <circle cx="-5" cy="-2" r="2.2" fill="#1f2937"/>
    <circle cx="5" cy="-2" r="2.2" fill="#1f2937"/>
    <path d="M-4 5 Q0 9 4 5" fill="none" stroke="#be123c" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-3 -10 Q0 -16 8 -12" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
    <path d="M16 20 Q42 18 58 12" fill="none" stroke="#f5c99a" stroke-width="8" stroke-linecap="round"/>
    <path d="M16 20 Q42 18 58 12" fill="none" stroke="#ea580c" stroke-width="5" stroke-linecap="round"/>
    <path d="M-10 56 L-18 86" stroke="#f5c99a" stroke-width="7" stroke-linecap="round"/>
    <path d="M10 56 L20 86" stroke="#f5c99a" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="108" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0f172a" font-weight="700" transform="scale(-1,1)">Boy B</text>
  </g>

  <!-- connection ropes to corners -->
  <line x1="136" y1="250" x2="220" y2="210" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <line x1="584" y1="250" x2="500" y2="210" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>

  <!-- speed label u -->
  <text x="360" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600">Square frame pulled at speed u</text>

  <!-- caption -->
  <text x="360" y="398" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">HC Verma Vol.2 · Electromagnetic Induction · Ex. Q23–Q24</text>
</svg>