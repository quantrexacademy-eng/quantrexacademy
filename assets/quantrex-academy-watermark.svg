<svg xmlns="http://www.w3.org/2000/svg" width="640" height="800" viewBox="0 0 640 800">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E4FFF"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="35%" stop-color="#CBD5E1"/>
      <stop offset="65%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E4FFF"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <ellipse cx="320" cy="250" rx="210" ry="78" fill="none" stroke="url(#orbitGrad)" stroke-width="18" transform="rotate(-28 320 250)"/>
    <ellipse cx="320" cy="250" rx="168" ry="58" fill="none" stroke="url(#orbitGrad)" stroke-width="8" opacity="0.55" transform="rotate(18 320 250)"/>

    <text x="320" y="310" text-anchor="middle" font-family="Kanit, Inter, Arial, sans-serif" font-size="280" font-weight="800" fill="url(#silverGrad)">Q</text>
    <text x="322" y="312" text-anchor="middle" font-family="Kanit, Inter, Arial, sans-serif" font-size="280" font-weight="800" fill="none" stroke="#64748B" stroke-width="2" opacity="0.35">Q</text>
  </g>

  <text x="320" y="430" text-anchor="middle" font-family="Kanit, Inter, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="6" fill="url(#textGrad)">QUANTREX</text>
  <text x="320" y="500" text-anchor="middle" font-family="Kanit, Inter, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="18" fill="#111827">ACADEMY</text>

  <g transform="translate(320 590)">
    <rect x="-250" y="-22" width="250" height="44" rx="6" fill="#1E4FFF"/>
    <text x="-125" y="8" text-anchor="middle" font-family="Kanit, Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2" fill="#FFFFFF">CONCEPTS CREATE</text>
    <rect x="0" y="-22" width="150" height="44" rx="6" fill="#FF7A00"/>
    <text x="75" y="8" text-anchor="middle" font-family="Kanit, Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#FFFFFF">DESTINY</text>
  </g>
</svg>