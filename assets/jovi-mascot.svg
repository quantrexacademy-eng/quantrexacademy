<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Jovi">
  <defs>
    <linearGradient id="joviHead" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="joviBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- antenna -->
  <circle cx="64" cy="14" r="6" fill="#fbbf24"/>
  <rect x="61" y="18" width="6" height="12" rx="2" fill="#94a3b8"/>
  <!-- head -->
  <rect x="28" y="28" width="72" height="52" rx="18" fill="url(#joviHead)"/>
  <!-- eyes -->
  <ellipse cx="48" cy="52" rx="10" ry="12" fill="#fff"/>
  <ellipse cx="80" cy="52" rx="10" ry="12" fill="#fff"/>
  <circle cx="50" cy="54" r="5" fill="#0f172a"/>
  <circle cx="82" cy="54" r="5" fill="#0f172a"/>
  <circle cx="52" cy="52" r="1.6" fill="#fff"/>
  <circle cx="84" cy="52" r="1.6" fill="#fff"/>
  <!-- smile -->
  <path d="M50 68 Q64 78 78 68" stroke="#9a3412" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="40" cy="62" r="4" fill="#fdba74" opacity=".85"/>
  <circle cx="88" cy="62" r="4" fill="#fdba74" opacity=".85"/>
  <!-- body -->
  <rect x="40" y="82" width="48" height="32" rx="12" fill="url(#joviBody)"/>
  <!-- Q badge -->
  <circle cx="64" cy="98" r="10" fill="#f97316"/>
  <text x="64" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="800" fill="#fff">Q</text>
  <!-- arms wave -->
  <rect x="18" y="86" width="18" height="8" rx="4" fill="#fb923c" transform="rotate(-25 27 90)"/>
  <rect x="92" y="88" width="18" height="8" rx="4" fill="#fb923c" transform="rotate(20 101 92)"/>
</svg>
