<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" role="img" aria-label="99 Percentile">
  <defs>
    <linearGradient id="99percentile-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="35%" stop-color="#b45309"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="99percentile-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="99percentile-gloss" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="99percentile-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="99percentile-emboss">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>
  <rect width="300" height="400" fill="url(#99percentile-bg)"/>
  
    <ellipse cx="220" cy="90" rx="120" ry="80" fill="url(#99percentile-shine)"/>
  <text x="200" y="70" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="15" font-style="italic" filter="url(#99percentile-glow)">99%</text>
    <text x="230" y="130" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="15" font-style="italic" filter="url(#99percentile-glow)">σ²</text>
    <text x="180" y="200" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="15" font-style="italic" filter="url(#99percentile-glow)">P(X)</text>
  <rect x="0" y="0" width="22" height="400" fill="rgba(0,0,0,0.32)"/>
  <rect x="22" y="0" width="3" height="400" fill="rgba(255,255,255,0.08)"/>
  <rect x="296" y="0" width="4" height="400" fill="rgba(255,255,255,0.12)"/>
  <rect x="0" y="0" width="300" height="400" fill="url(#99percentile-gloss)"/>
  <text x="32" y="34" fill="rgba(255,255,255,0.88)" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="800" letter-spacing="2.2">QUANTREX ACADEMY</text>
  
  <text x="34" y="118" fill="rgba(0,0,0,0.35)" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">99</text>
    <text x="32" y="116" fill="#ffffff" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">99</text>
    <text x="34" y="154" fill="rgba(0,0,0,0.35)" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Percentile</text>
    <text x="32" y="152" fill="#ffffff" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Percentile</text>
