  <rect x="32" y="210" width="108" height="24" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
  <text x="46" y="227" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700">High Yield</text>
  <text x="32" y="268" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800">JEE Main</text>
