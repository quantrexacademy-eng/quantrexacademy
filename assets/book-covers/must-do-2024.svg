      <stop offset="35%" stop-color="#be123c"/>
      <stop offset="70%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#fda4af"/>
    </linearGradient>
    <linearGradient id="mustdo2024-shine" x1="0%" y1="0%" x2="100%" y2="100%">
