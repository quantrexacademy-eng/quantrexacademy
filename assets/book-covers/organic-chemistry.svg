<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" role="img" aria-label="Fundamentals of Organic Chemistry">
  <defs>
    <linearGradient id="org-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="35%" stop-color="#14532d"/>
      <stop offset="70%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="org-gloss" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="org-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="org-emboss">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>
  <rect width="300" height="400" fill="url(#org-bg)"/>

  <!-- Wave accents (same language as HC Verma V2) -->
  <path d="M-20 320 Q80 260 180 320 T380 320" stroke="#86efac" stroke-opacity="0.18" stroke-width="2.5" fill="none"/>
  <path d="M-20 350 Q100 290 200 350 T400 350" stroke="#86efac" stroke-opacity="0.12" stroke-width="2" fill="none"/>
  <path d="M-20 380 Q60 340 160 380 T360 380" stroke="#86efac" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
  <path d="M200 40 Q260 100 220 180 Q180 260 250 340" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>

  <!-- Faint formula motifs -->
  <text x="175" y="70" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="14" font-style="italic" filter="url(#org-glow)">C₆H₆</text>
  <text x="215" y="125" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="13" font-style="italic" filter="url(#org-glow)">R–OH</text>
  <text x="170" y="195" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="13" font-style="italic" filter="url(#org-glow)">–COOH</text>
  <text x="220" y="270" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="13" font-style="italic" filter="url(#org-glow)">SN1 / SN2</text>

  <!-- Spine / page edge -->
  <rect x="0" y="0" width="22" height="400" fill="rgba(0,0,0,0.32)"/>
  <rect x="22" y="0" width="3" height="400" fill="rgba(255,255,255,0.08)"/>
  <rect x="296" y="0" width="4" height="400" fill="rgba(255,255,255,0.12)"/>
  <rect x="0" y="0" width="300" height="400" fill="url(#org-gloss)"/>

  <text x="32" y="34" fill="rgba(255,255,255,0.88)" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="800" letter-spacing="2.2">QUANTREX ACADEMY</text>

  <text x="34" y="118" fill="rgba(0,0,0,0.35)" font-family="Literata,Georgia,serif" font-size="26" font-weight="700">Fundamentals of</text>
  <text x="32" y="116" fill="#ffffff" font-family="Literata,Georgia,serif" font-size="26" font-weight="700">Fundamentals of</text>
  <text x="34" y="154" fill="rgba(0,0,0,0.35)" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Organic Chemistry</text>
  <text x="32" y="152" fill="#ffffff" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Organic Chemistry</text>

  <text x="32" y="198" fill="rgba(255,255,255,0.92)" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" filter="url(#org-emboss)">Digital Edition</text>
  <rect x="32" y="210" width="148" height="24" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
  <text x="44" y="227" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700">JEE Main &amp; Advanced</text>

  <text x="32" y="268" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">Organic Prep</text>
  <text x="32" y="292" fill="rgba(255,255,255,0.82)" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600">Chemistry · Structure · Reactions</text>

  <!-- Icon circle (like HCV atom) -->
  <circle cx="248" cy="72" r="34" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Mini benzene -->
  <g transform="translate(248,72)" stroke="rgba(255,255,255,0.9)" stroke-width="1.6" fill="none" stroke-linejoin="round">
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke-width="0.9" opacity="0.4"/>
  </g>

  <rect x="0" y="372" width="300" height="28" fill="rgba(0,0,0,0.22)"/>
  <text x="32" y="390" fill="rgba(255,255,255,0.7)" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="800" letter-spacing="1.8">DIGITAL EDITION</text>
  <text x="268" y="390" text-anchor="end" fill="rgba(255,255,255,0.55)" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700">QX</text>
</svg>
