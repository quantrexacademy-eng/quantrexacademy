<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" role="img" aria-label="Fundamentals of Organic Chemistry — Quantrex Academy">
  <defs>
    <linearGradient id="orgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="40%" stop-color="#14532d"/>
      <stop offset="75%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="orgPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="orgGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="orgGloss" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="orgShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="4" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- 3D book body -->
  <g filter="url(#orgShadow)">
    <rect x="14" y="12" width="252" height="372" rx="10" fill="url(#orgBg)"/>
    <!-- spine edge -->
    <path d="M14 22 L6 30 L6 366 L14 374 Z" fill="#064e3b"/>
    <rect x="14" y="12" width="10" height="372" rx="2" fill="#065f46" opacity="0.85"/>
    <!-- pages edge right -->
    <path d="M266 20 L280 28 L280 368 L266 376 Z" fill="#bbf7d0"/>
    <path d="M268 24 L276 30 L276 364 L268 372 Z" fill="#f0fdf4" opacity="0.9"/>
  </g>

  <!-- gloss -->
  <rect x="24" y="20" width="100" height="350" fill="url(#orgGloss)" opacity="0.55"/>

  <!-- Quantrex badge -->
  <rect x="32" y="28" width="150" height="28" rx="8" fill="rgba(0,0,0,0.35)"/>
  <circle cx="48" cy="42" r="9" fill="#38bdf8"/>
  <path d="M44 42 L48 37 L52 42 L48 47 Z" fill="#0f172a"/>
  <text x="64" y="47" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" fill="#f8fafc" letter-spacing="0.6">QUANTREX ACADEMY</text>

  <!-- Title block -->
  <text x="36" y="90" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#bbf7d0" font-weight="600">Fundamentals of</text>
  <text x="34" y="128" font-family="Kanit,Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800" fill="#86efac">ORGANIC</text>
  <text x="34" y="162" font-family="Kanit,Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800" fill="#f8fafc">CHEMISTRY</text>

  <!-- exam ribbon -->
  <path d="M34 178 L200 178 L212 192 L200 206 L34 206 Z" fill="url(#orgGold)"/>
  <text x="48" y="198" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" fill="#14532d">JEE MAIN &amp; ADVANCED</text>

  <!-- molecule panel -->
  <rect x="40" y="228" width="200" height="110" rx="12" fill="url(#orgPanel)" opacity="0.95"/>
  <!-- simple benzene + side chain (line art) -->
  <g transform="translate(70,255)" stroke="#14532d" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="40,8 64,22 64,50 40,64 16,50 16,22"/>
    <line x1="40" y1="8" x2="40" y2="64" stroke-width="1.2" opacity="0.35"/>
    <line x1="64" y1="22" x2="16" y2="50" stroke-width="1.2" opacity="0.35"/>
    <line x1="64" y1="50" x2="16" y2="22" stroke-width="1.2" opacity="0.35"/>
    <line x1="64" y1="36" x2="92" y2="36"/>
    <line x1="92" y1="36" x2="110" y2="20"/>
    <circle cx="110" cy="20" r="3" fill="#16a34a" stroke="none"/>
    <text x="116" y="24" font-family="Inter,Arial,sans-serif" font-size="10" fill="#166534" stroke="none" font-weight="700">OH</text>
    <line x1="92" y1="36" x2="110" y2="52"/>
    <text x="112" y="56" font-family="Inter,Arial,sans-serif" font-size="10" fill="#166534" stroke="none" font-weight="700">CH₃</text>
  </g>

  <!-- footer -->
  <rect x="28" y="350" width="220" height="26" rx="13" fill="rgba(0,0,0,0.4)"/>
  <text x="138" y="368" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#ecfdf5" letter-spacing="1">2026–27 DIGITAL EDITION</text>
</svg>
