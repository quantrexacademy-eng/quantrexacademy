<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" role="img" aria-label="Organic Chemistry">
  <defs>
    <linearGradient id="org3d-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c3d24"/>
      <stop offset="30%" stop-color="#166534"/>
      <stop offset="65%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="org3d-gloss" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="org3d-spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <filter id="org3d-emboss"><feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="rgba(0,0,0,0.45)"/></filter>
    <filter id="org3d-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="300" height="400" fill="url(#org3d-bg)"/>
  <!-- hex grid -->
  <g fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.1">
    <polygon points="230,50 250,62 250,86 230,98 210,86 210,62"/>
    <polygon points="260,100 280,112 280,136 260,148 240,136 240,112"/>
    <polygon points="220,150 240,162 240,186 220,198 200,186 200,162"/>
  </g>
  <!-- benzene accent -->
  <g transform="translate(220,95)" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2">
    <polygon points="30,0 52,12 52,38 30,50 8,38 8,12"/>
    <circle cx="30" cy="25" r="10" stroke="rgba(255,255,255,0.2)"/>
  </g>
  <text x="200" y="200" fill="rgba(255,255,255,0.14)" font-family="Georgia,serif" font-size="14" font-style="italic" filter="url(#org3d-glow)">C₆H₆</text>
  <text x="230" y="250" fill="rgba(255,255,255,0.12)" font-family="Georgia,serif" font-size="14" font-style="italic">SN²</text>
  <text x="190" y="300" fill="rgba(255,255,255,0.12)" font-family="Georgia,serif" font-size="14" font-style="italic">R–OH</text>
  <!-- 3D spine -->
  <rect x="0" y="0" width="22" height="400" fill="url(#org3d-spine)"/>
  <rect x="22" y="0" width="3" height="400" fill="rgba(255,255,255,0.1)"/>
  <rect x="296" y="0" width="4" height="400" fill="rgba(255,255,255,0.14)"/>
  <rect width="300" height="400" fill="url(#org3d-gloss)"/>
  <text x="32" y="34" fill="rgba(255,255,255,0.9)" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="800" letter-spacing="2.2">QUANTREX ACADEMY</text>
  <rect x="32" y="48" width="52" height="20" rx="10" fill="rgba(255,255,255,0.22)"/>
  <text x="44" y="62" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="800">JEE</text>
  <text x="34" y="118" fill="rgba(0,0,0,0.35)" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Organic</text>
  <text x="32" y="116" fill="#ffffff" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Organic</text>
  <text x="34" y="154" fill="rgba(0,0,0,0.35)" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Chemistry</text>
  <text x="32" y="152" fill="#ffffff" font-family="Literata,Georgia,serif" font-size="28" font-weight="700">Chemistry</text>
  <text x="32" y="190" fill="rgba(255,255,255,0.95)" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" filter="url(#org3d-emboss)">Fundamentals</text>
  <rect x="32" y="204" width="130" height="24" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.28)" stroke-width="0.5"/>
  <text x="44" y="221" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700">JEE Main &amp; Adv</text>
  <text x="32" y="268" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800">Complete Syllabus</text>
  <text x="32" y="292" fill="rgba(255,255,255,0.85)" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600">Chemistry · IIT-JEE Prep</text>
  <circle cx="248" cy="72" r="34" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="248" y="82" text-anchor="middle" font-size="28" filter="url(#org3d-glow)">⚗</text>
  <rect x="0" y="372" width="300" height="28" fill="rgba(0,0,0,0.28)"/>
  <text x="32" y="390" fill="rgba(255,255,255,0.75)" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="800" letter-spacing="1.8">DIGITAL EDITION</text>
  <text x="268" y="390" text-anchor="end" fill="rgba(255,255,255,0.55)" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700">QX</text>
</svg>
