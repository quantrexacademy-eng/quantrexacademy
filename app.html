<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <title>Quantrex App - IIT JEE &amp; NEET Prep (Working)</title>
    <meta name="theme-color" content="#1589EE">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1589EE; --primary-dark: #0f6fc4; --primary-light: #eaf4fd;
            --green: #2bc48a; --green-light: #e6f9f0; --purple: #7c5ce7; --purple-light: #f3eafe;
            --orange: #f59e0b; --orange-light: #fff3cd; --red: #ef4444; --red-light: #fee2e2;
            --gold: #fbbf24; --dark: #1a1a2e; --gray: #6b7280; --bg: #f4f6f9;
            --border: #e8ecf2; --white: #fff;
            --card: #fff; --text: #1a1a2e; --shadow: rgba(0,0,0,.06);
        }
        [data-theme="dark"] {
            --primary: #3b9eff; --primary-dark: #2588d4; --primary-light: #1a2d42;
            --green-light: #1a3328; --purple-light: #2a2240; --orange-light: #3d3010;
            --red-light: #3d2020; --bg: #0f1419; --border: #2a3441; --white: #1a2332;
            --card: #1a2332; --dark: #e8ecf2; --gray: #9ca3af; --text: #e8ecf2;
            --shadow: rgba(0,0,0,.35);
        }
        [data-theme="dark"] body { background: var(--bg); color: var(--text); }
        [data-theme="dark"] .sidebar, [data-theme="dark"] .topbar, [data-theme="dark"] .qa-wrap,
        [data-theme="dark"] .q-card, [data-theme="dark"] .ds, [data-theme="dark"] .dash-card,
        [data-theme="dark"] .fc-card, [data-theme="dark"] .builder, [data-theme="dark"] .test-card,
        [data-theme="dark"] .book-card, [data-theme="dark"] .note-card, [data-theme="dark"] .profile-card,
        [data-theme="dark"] .lb-list-app, [data-theme="dark"] .qx-palette, [data-theme="dark"] .qx-hist-row {
            background: var(--card); color: var(--text);
        }
        [data-theme="dark"] .chip, [data-theme="dark"] .btn-soft, [data-theme="dark"] .qa-opt,
        [data-theme="dark"] .b-field select, [data-theme="dark"] .b-field input,
        [data-theme="dark"] .note-add textarea, [data-theme="dark"] .bank-picker select,
        [data-theme="dark"] .qx-search-box input {
            background: var(--bg); color: var(--text); border-color: var(--border);
        }
        [data-theme="dark"] .empty { background: var(--card); border-color: var(--border); }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--dark); }

        .app { display: flex; min-height: 100vh; }

        .sidebar { width: 250px; background: var(--white); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; transition: transform .3s; }
        .sidebar-head { padding: 20px 22px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .logo-mark { width: 38px; height: 38px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Kanit'; font-weight: 800; font-size: 20px; }
        .logo-text { font-family: 'Kanit'; font-weight: 800; font-size: 22px; }
        .nav-list { flex: 1; padding: 14px 12px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 15px; color: var(--gray); transition: all .15s; margin-bottom: 4px; user-select: none; }
        .nav-item:hover { background: var(--bg); color: var(--dark); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .nav-item .ic { font-size: 19px; width: 24px; text-align: center; }
        .sidebar-foot { padding: 14px 12px; border-top: 1px solid var(--border); }
        .sidebar-theme { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--gray); background: none; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; text-align: left; transition: background .15s, color .15s; }
        .sidebar-theme:hover { background: var(--bg); color: var(--dark); }
        .sidebar-theme .ic { font-size: 18px; width: 24px; text-align: center; }
        .back-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: var(--primary); text-decoration: none; border-radius: 10px; transition: background .15s; }
        .back-link:hover { background: var(--primary-light); }
        .back-link .ic { font-size: 16px; }
        .exam-pill { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .exam-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }

        .main { flex: 1; margin-left: 250px; display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .menu-btn { display: none; background: none; border: none; font-size: 24px; cursor: pointer; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar .exam-tag { background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        .topbar .streak { display: flex; align-items: center; gap: 4px; background: var(--orange-light); color: #9a6b00; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        .logout-link { border: none; cursor: pointer; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: background .15s; }
        .comm-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
        .comm-post { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .comm-head { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .comm-head small { color: var(--gray); }
        .comm-add textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-family: inherit; margin-bottom: 10px; resize: vertical; }
        .lb-lc small { display: block; font-size: 10px; color: var(--gray); font-weight: 400; }
        .logout-link:hover { background: var(--primary-light); }
        .content { padding: 28px; flex: 1; max-width: 1100px; margin: 0 auto; width: 100%; }

        .page-head { margin-bottom: 24px; }
        .page-head h1 { font-family: 'Kanit'; font-size: 30px; font-weight: 800; }
        .page-head p { color: var(--gray); font-size: 15px; margin-top: 2px; }

        .dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 22px; }
        .ds { background: var(--white); border-radius: 14px; padding: 18px; border: 1px solid var(--border); text-align: center; }
        .ds strong { display: block; font-family: 'Kanit'; font-size: 26px; color: var(--primary); }
        .ds small { color: var(--gray); font-size: 13px; }
        .dpp-banner { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #fff; padding: 16px 22px; border-radius: 14px; margin-bottom: 24px; cursor: pointer; transition: transform .15s; }
        .dpp-banner:hover { transform: translateY(-2px); }
        .dpp-banner-left { display: flex; align-items: center; gap: 12px; }
        .dpp-banner strong { display: block; font-size: 16px; }
        .dpp-banner small { opacity: .9; font-size: 13px; }
        .live-dot { width: 10px; height: 10px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .sec-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
        .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .dash-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; gap: 6px; }
        .dash-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(21,137,238,.1); }
        .dash-ic { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
        .dash-card strong { font-size: 15px; }
        .dash-card small { color: var(--gray); font-size: 12px; }

        .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .chip { background: var(--white); border: 1px solid var(--border); padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--gray); }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .result-count { color: var(--gray); font-size: 13px; margin-bottom: 14px; font-weight: 600; }

        .q-list { display: flex; flex-direction: column; gap: 12px; }
        .q-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: transform .15s, box-shadow .15s; }
        .q-card:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,.06); }
        .q-meta { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: var(--bg); }
        .tag-physics { background: var(--primary-light); color: var(--primary); }
        .tag-chemistry { background: var(--green-light); color: var(--green); }
        .tag-mathematics { background: var(--purple-light); color: var(--purple); }
        .tag-biology, .tag-science, .tag-zoology, .tag-botany { background: var(--red-light); color: var(--red); }
        .bank-picker { margin-bottom: 16px; }
        .bank-picker label { display: block; font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
        .bank-picker select { width: 100%; max-width: 420px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-weight: 600; background: var(--white); font-family: inherit; }
        .pagination { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 20px; padding: 12px 0; }
        .pagination span { font-size: 13px; font-weight: 600; color: var(--gray); }
        .pagination button:disabled { opacity: .4; cursor: not-allowed; }
        .breadcrumb { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; font-size: 13px; }
        .breadcrumb a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: var(--gray); }
        .breadcrumb .bc-cur { color: var(--dark); font-weight: 700; }
        .exam-grid, .subj-grid, .ch-grid, .tests-grid, .dpp-sets-grid { display: grid; gap: 12px; margin-bottom: 20px; }
        .exam-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .subj-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        .ch-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        .tests-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        .dpp-sets-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        .exam-card, .subj-card, .ch-card, .test-card, .dpp-set-card, .exam-pill-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: transform .15s, box-shadow .15s; }
        .exam-card:hover, .subj-card:hover, .ch-card:hover, .test-card:hover, .dpp-set-card:hover, .exam-pill-card:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,.06); }
        .subj-card { display: flex; align-items: center; gap: 14px; }
        .subj-ic { font-size: 28px; width: 48px; height: 48px; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .subj-card strong, .ch-card strong, .exam-card strong { display: block; font-size: 15px; margin-bottom: 4px; }
        .subj-card small, .ch-card small, .exam-card small { color: var(--gray); font-size: 12px; }
        .exam-card-ic { font-size: 24px; margin-bottom: 8px; }
        .qx-mode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .qx-mode-card { background: var(--white); border: 2px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: transform .15s, border-color .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 6px; }
        .qx-mode-card:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 8px 24px rgba(79,70,229,.12); }
        .qx-mode-ic { font-size: 28px; margin-bottom: 4px; }
        .qx-mode-card strong { font-size: 16px; }
        .qx-mode-card small { color: var(--gray); font-size: 12px; line-height: 1.4; }
        .qx-topic-grid { grid-template-columns: 1fr; }
        .qx-topic-card { display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: 14px; padding: 0; overflow: hidden; transition: border-color .12s, box-shadow .12s; }
        .qx-topic-card:hover { border-color: var(--primary); box-shadow: 0 4px 14px rgba(21,137,238,.1); }
        .qx-topic-body { padding: 14px 16px; flex: 1; }
        .qx-topic-body strong { display: block; font-size: 14px; line-height: 1.4; margin-bottom: 4px; }
        .qx-topic-body small { color: var(--gray); font-size: 12px; }
        .qx-ch-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .qx-ch-body { flex: 1; min-width: 0; }
        .qx-ch-badge { font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
        .qx-ch-badge.topic { background: #eff6ff; color: #2563eb; }
        .qx-ch-badge.bucket { background: #f0fdf4; color: #16a34a; }
        .qx-load-more { text-align: center; padding: 20px; color: var(--gray); font-size: 13px; }
        .qc-concept-card, .qc-example-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; }
        .qc-concept-card h3 { font-size: 15px; margin: 0 0 10px; }
        .qc-examples { display: flex; flex-direction: column; gap: 10px; }
        .dpp-set-card .dpp-level { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; margin-bottom: 6px; }
        .dpp-set-card.level-easy .dpp-level { background: var(--green-light); color: var(--green); }
        .dpp-set-card.level-moderate .dpp-level { background: var(--orange-light); color: #9a6b00; }
        .dpp-set-card.level-tough .dpp-level { background: var(--red-light); color: var(--red); }
        .test-card { display: flex; flex-direction: column; gap: 8px; }
        .test-ic { font-size: 32px; }

        /* MARKS-style Tests page */
        .marks-tests-page { max-width: 720px; margin: 0 auto; }
        .marks-tests-head { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .marks-tests-head h1 { font-family: 'Kanit'; font-size: 28px; font-weight: 800; margin: 0; }
        .marks-tests-shield { font-size: 28px; }
        .marks-tests-hero { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
        .mth-card { display: flex; align-items: center; gap: 14px; background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s; }
        .mth-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px var(--shadow); border-color: var(--primary); }
        .mth-body { flex: 1; min-width: 0; }
        .mth-body strong { display: block; font-size: 17px; font-weight: 800; margin-bottom: 4px; }
        .mth-body small { color: var(--gray); font-size: 13px; }
        .mth-ic { font-size: 28px; flex-shrink: 0; }
        .mth-arrow { font-size: 20px; color: var(--gray); font-weight: 700; }
        .mth-custom { border-left: 4px solid var(--primary); }
        .mth-pyq { border-left: 4px solid #ec4899; }
        .marks-ts-section { margin-bottom: 32px; }
        .marks-ts-section h3 { font-size: 20px; font-weight: 800; margin: 0 0 4px; text-align: center; }
        .marks-ts-sub { text-align: center; color: var(--gray); font-size: 13px; margin-bottom: 20px; }
        .marks-ts-grid { display: flex; flex-direction: column; gap: 12px; }
        .mts-card { display: flex; align-items: stretch; gap: 14px; background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .15s, opacity .15s; opacity: .92; }
        .mts-card:hover { transform: translateY(-2px); opacity: 1; }
        .mts-logo { width: 88px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; text-align: center; line-height: 1.2; color: #fff; padding: 12px 8px; }
        .mts-jeeboth .mts-logo { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
        .mts-jeemain .mts-logo { background: linear-gradient(135deg, #1e3a5f, #0f172a); }
        .mts-jeeadv .mts-logo { background: linear-gradient(135deg, #15803d, #166534); }
        .mts-neet .mts-logo, .mts-neet2 .mts-logo { background: linear-gradient(135deg, #0d9488, #0f766e); }
        .mts-aiims .mts-logo { background: linear-gradient(135deg, #dc2626, #b91c1c); }
        .mts-nda .mts-logo, .mts-nda2 .mts-logo { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
        .mts-gk .mts-logo { background: linear-gradient(135deg, #ca8a04, #a16207); }
        .mts-body { flex: 1; padding: 14px 14px 14px 0; display: flex; flex-direction: column; justify-content: center; }
        .mts-body strong { font-size: 15px; font-weight: 700; display: block; margin-bottom: 3px; }
        .mts-body small { color: var(--gray); font-size: 12px; display: block; margin-bottom: 6px; }
        .mts-soon { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--orange); background: var(--orange-light); padding: 3px 8px; border-radius: 6px; }
        .marks-tests-more { margin-top: 8px; }

        /* MARKS-style CPYQB chapter list */
        .cpyqb-continue { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
        .cpyqb-continue:hover { border-color: var(--primary); box-shadow: 0 6px 18px var(--shadow); }
        .cpyqb-continue-body strong { display: block; font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .cpyqb-continue-btn { display: inline-block; font-size: 12px; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 4px 10px; border-radius: 8px; }
        .cpyqb-continue-prog { text-align: right; min-width: 100px; }
        .cpyqb-prog-bar { width: 100px; height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-bottom: 4px; margin-left: auto; }
        .cpyqb-prog-bar span { display: block; height: 100%; background: var(--primary); border-radius: 99px; }
        .cpyqb-continue-prog small { color: var(--gray); font-size: 12px; font-weight: 600; }
        .cpyqb-filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 14px; padding: 10px 12px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; }
        .cpyqb-filter-label { font-size: 13px; font-weight: 700; color: var(--gray); margin-right: 4px; }
        .cpyqb-filter-sel { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; font-family: inherit; background: var(--bg); color: var(--dark); cursor: pointer; }
        .cpyqb-filter-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; user-select: none; transition: border-color .12s, background .12s; }
        .cpyqb-filter-chip.on { border-color: var(--orange); background: var(--orange-light); color: #9a6b00; }
        .cpyqb-filter-chip input { display: none; }
        .cpyqb-filter-count { font-size: 12px; color: var(--gray); margin-left: auto; }
        .cpyqb-sort-link { font-size: 12px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .cpyqb-sort-hidden { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
        .cpyqb-ch-list { display: flex; flex-direction: column; gap: 8px; }
        .cpyqb-ch-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: border-color .12s, transform .12s; }
        .cpyqb-ch-row:hover { border-color: var(--primary); transform: translateX(2px); }
        .cpyqb-ch-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .cpyqb-ch-ic { width: 36px; height: 36px; border-radius: 10px; object-fit: contain; flex-shrink: 0; }
